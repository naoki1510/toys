name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://toys.naoki1510.net
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      # version は package.json の "packageManager" から読む
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # typecheck (内部で routeTree と Cloudflare 型を生成) を build より先に走らせ、
      # build まで進む前に型エラーで止める。`pnpm build` は vite build のみで型を見ない。
      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: deploy
