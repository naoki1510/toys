name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # worker-configuration.d.ts (gitignore 済み) を生成。
      # build 中の型チェックがこの型に依存する場合に必要。
      - run: pnpm cf-typegen

      - run: pnpm test

      # build は内部で `tsc --noEmit` も走る (package.json 参照)
      - run: pnpm build
