name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 共有 reusable workflow。`pnpm lint` / `pnpm format:check` / `pnpm typecheck`
  # / `pnpm test` / `pnpm build` の各 script を並列に呼ぶ前提なので、この repo 側で
  # `package.json` の script 名を変えるときは `naoki1510/ci-workflows` の README も
  # 確認すること (input でリネームできる)。
  vite:
    uses: naoki1510/ci-workflows/.github/workflows/vite-ci.yml@v1
